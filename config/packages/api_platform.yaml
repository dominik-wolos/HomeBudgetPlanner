api_platform:
    title: Task Microservice
    use_symfony_listeners: true
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    formats:
        json: ['application/json']
        jsonld: ['application/ld+json']
    mapping:
        paths:
            - '%kernel.project_dir%/src/Entity'
    swagger:
        api_keys:
            - name: Authorization
              type: header
              key: Bearer
